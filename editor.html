<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; display: flex; margin: 0; padding: 20px; background: #f4f5f7; height: 100vh; box-sizing: border-box; }
    .sidebar { width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-right: 20px; display: flex; flex-direction: column; overflow-y: auto; }
    .workspace { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ebecf0; border-radius: 8px; position: relative; overflow: hidden; }
    
    input, textarea, button { width: 100%; margin-bottom: 12px; box-sizing: border-box; padding: 10px; border: 1px solid #dfe1e6; border-radius: 4px; }
    button { background: #0052CC; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #0047b3; }
    
    canvas { border: 2px dashed #0052CC; cursor: crosshair; display: block; }
    video { max-width: 100%; max-height: 100%; display: none; background: black; }
    
    #controls { position: absolute; top: 10px; right: 10px; background: white; padding: 10px; border-radius: 4px; display: none; }
    #markupTools { position: absolute; top: 10px; left: 10px; background: white; padding: 10px; border-radius: 8px; display: none; gap: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.12); z-index: 3; }
    #markupTools button { width: auto; margin: 0; padding: 8px 14px; }
    #markupTools button.active { background: #172B4D; }
    #mediaStage { position: relative; width: 100%; height: 100%; min-height: 0; padding: 24px; box-sizing: border-box; }
    #status { font-weight: bold; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

  <div class="sidebar">
    <h3>Bug Details</h3>
    <input type="text" id="bugSummary" placeholder="Bug Title">
    <textarea id="bugDescription" rows="5" placeholder="Steps to reproduce..."></textarea>
    
    <button id="submitBtn">Submit Bug to Jira</button>
    <div id="status"></div>
  </div>

  <div class="workspace">
    <div id="markupTools">
      <button id="drawToolBtn" class="active">Draw</button>
      <button id="textToolBtn">Text</button>
      <button id="rectToolBtn">Rectangle</button>
      <button id="circleToolBtn">Circle</button>
      <button id="deleteToolBtn">Delete</button>
    </div>
    <div id="mediaStage">
      <canvas id="markupCanvas" style="display:none;"></canvas>
    </div>
    
    <video id="videoPreview" controls></video>
    <div id="controls">
      <button id="startRecordBtn" style="background: #FF5630;">Start Recording</button>
      <button id="stopRecordBtn" style="display:none;">Stop Recording</button>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="fabric.min.js"></script>
  <script src="config.js"></script>
  <script src="editor.js"></script>
</body>
</html>
